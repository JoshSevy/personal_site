# Contract for https://api.joshuasevy.com/graphql — deploy equivalent schema on the server before shipping this app.
# npm run codegen — uses committed SDL by default; set GRAPHQL_SCHEMA_URL to introspect a live endpoint.
# npm run graphql:schema:pull — overwrite this file from GRAPHQL_SCHEMA_URL (default: production API).

type Mutation {
  createPost(
    title: String!
    slug: String!
    content: String!
    excerpt: String
    author: String
    published: Boolean
    tags: [String!]
    hero_image_url: String
  ): Post
  updatePost(
    id: ID!
    title: String
    slug: String
    content: String
    excerpt: String
    author: String
    published: Boolean
    tags: [String!]
    hero_image_url: String
  ): Post
  deletePost(id: ID!): Post
}

type Post {
  id: ID!
  title: String!
  slug: String!
  content: String!
  excerpt: String
  author: String
  publish_date: String
  updated_at: String
  published: Boolean!
  tags: [String!]
  hero_image_url: String
}

type Query {
  posts(publishedOnly: Boolean): [Post]
  post(id: ID!): Post
  postBySlug(slug: String!): Post
  trophies(username: String!): String
}
