<div class="admin-form-page">
  <h1 class="text-2xl font-bold mb-6">New post</h1>

  <form (ngSubmit)="createPost()" class="admin-form space-y-5">
    <div class="form-field">
      <label for="title">Title</label>
      <input
        id="title"
        name="title"
        [(ngModel)]="title"
        (ngModelChange)="onTitleChange()"
        required
        class="form-input"
        autocomplete="off"
      />
    </div>

    <div class="form-field">
      <label for="slug">URL slug</label>
      <input
        id="slug"
        name="slug"
        [(ngModel)]="slugManual"
        (ngModelChange)="slugTouched = true"
        [placeholder]="slugifyPreview(title) || 'my-post-title'"
        class="form-input font-mono text-sm"
        autocomplete="off"
      />
      <p class="form-hint">Leave blank to derive from title. Preview: <code class="text-sky-400">{{ slug || '…' }}</code></p>
    </div>

    <div class="form-field">
      <label for="excerpt">Excerpt</label>
      <textarea
        id="excerpt"
        name="excerpt"
        [(ngModel)]="excerpt"
        rows="3"
        class="form-input"
        placeholder="Short summary for cards and SEO"
      ></textarea>
    </div>

    <div class="form-field">
      <label for="tags">Tags</label>
      <input
        id="tags"
        name="tags"
        [(ngModel)]="tagsInput"
        class="form-input"
        placeholder="angular, graphql, typescript"
      />
      <p class="form-hint">Comma-separated</p>
    </div>

    <div class="form-field">
      <label for="author">Author</label>
      <input id="author" name="author" [(ngModel)]="author" class="form-input" />
    </div>

    <div class="form-field flex items-center gap-2">
      <input id="published" type="checkbox" name="published" [(ngModel)]="published" />
      <label for="published" class="!mb-0">Published (visible on public blog)</label>
    </div>

    <div class="form-field">
      <span class="block mb-1">Hero image</span>
      <input type="file" accept="image/*" (change)="onHeroFile($event)" class="text-sm" />
      @if (uploading) {
        <p class="form-hint">Uploading…</p>
      }
      @if (uploadError) {
        <p class="text-amber-400 text-sm mt-1">{{ uploadError }}</p>
      }
      @if (heroImageUrl) {
        <p class="form-hint mt-2 break-all">URL: {{ heroImageUrl }}</p>
        <img [src]="heroImageUrl" alt="" class="mt-2 max-h-32 rounded border border-[var(--site-border)]" />
      }
    </div>

    <div class="form-field">
      <span class="block mb-2">Body (Markdown)</span>
      <app-markdown-editor [(content)]="content"></app-markdown-editor>
    </div>

    <div class="flex gap-3 pt-2">
      <button type="submit" class="button-primary px-5 py-2.5 rounded-lg font-medium">Create post</button>
      <a routerLink="/admin/posts" class="px-5 py-2.5 rounded-lg border border-[var(--site-border)] self-center text-sm">
        Cancel
      </a>
    </div>
  </form>
</div>
